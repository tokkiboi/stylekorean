name: Quality
on: [push, pull_request]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate JavaScript
        run: |
          node --check app.js
          node --check platform-config.js
          node --check database-config.js
          node --check database-client.js
          node smoke-test.js
          node --test *.test.js
      - name: Validate required static assets
        run: |
          test -s index.html
          test -s styles.css
          test -s app.js
          test -s site-config.js
          test -s database-config.js
          test -s database-client.js
          test -s supabase/migrations/202607200001_logistics_platform.sql
          test -s supabase/functions/source-sync/index.ts
          test -f .nojekyll
