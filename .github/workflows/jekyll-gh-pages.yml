# Custom GitHub Pages deployment — static files only, no Jekyll build required.
# The .nojekyll file in the repository root ensures GitHub Pages serves files as-is.
name: Deploy static dashboard to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: ["main"]

  # Periodic re-deploy keeps the Pages CDN cache fresh even without code changes
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant the minimum permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment at a time; never cancel an in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  validate:
    name: Validate static assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required files exist
        run: |
          MISSING=0
          for f in index.html app.js styles.css .nojekyll; do
            if [ ! -f "$f" ]; then
              echo "❌  Missing required file: $f"
              MISSING=1
            else
              echo "✅  $f"
            fi
          done
          [ $MISSING -eq 0 ] || exit 1

  # ── Deploy ──────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Upload the repository root directly — no Jekyll processing needed
      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
